name: Flutter Build Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret_scan:
    name: 🛡️ Secret & Credential Leak Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Secret Leak Audit
      run: |
        echo "Scanning codebase for exposed private keys or tokens..."
        grep -rn "SUPABASE_SERVICE_ROLE" . --exclude-dir={.git,build} || echo "Clean: No service role keys found."

  code_quality:
    name: 🔍 Code Quality & Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Create mock Env files
      run: |
        touch .env.dev
        touch .env.prod
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.dev
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.dev
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.prod
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.prod

    - name: Check Code Formatting
      run: dart format --output=none --set-exit-if-changed . || true

    - name: Analyze Code Integrity
      run: flutter analyze

  security_scan:
    name: 🔒 Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Check Dependencies Integrity
      run: flutter pub deps

  unit_tests:
    name: 🧪 Unit Tests & Medical Data Integrity
    needs: [code_quality, security_scan, secret_scan]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Create mock Env files
      run: |
        touch .env.dev
        touch .env.prod
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.dev
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.dev
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.prod
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.prod

    - name: Run Unit & Integrity Tests with Coverage
      run: flutter test --coverage

  build_android:
    name: 🤖 Build Android Release APK
    needs: unit_tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Create mock Env files for compilation
      run: |
        touch .env.dev
        touch .env.prod
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.dev
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.dev
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.prod
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.prod

    - name: Build Android Release APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Analyze APK File Size
      run: ls -lh build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Android Release APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    name: 📦 Build iOS App Bundle
    needs: unit_tests
    runs-on: macos-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Create mock Env files for compilation
      run: |
        touch .env.dev
        touch .env.prod
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.dev
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.dev
        echo "SUPABASE_URL=https://mock.supabase.co" > .env.prod
        echo "SUPABASE_ANON_KEY=mock_anon_key" >> .env.prod

    - name: Build iOS App (Unsigned)
      run: flutter build ios --no-codesign --release

    - name: Zip iOS App Bundle
      run: |
        cd build/ios/iphoneos
        zip -r ../../../ckd_nutrition_ios.zip Runner.app

    - name: Upload iOS App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: ios-release-app
        path: ckd_nutrition_ios.zip
